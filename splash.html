<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:520px; height:360px;
  background: linear-gradient(135deg, #0F172A 0%, #1E3A8A 100%);
  font-family: 'Segoe UI', Arial, sans-serif;
  overflow: hidden;
  user-select: none;
}
.wrap {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  height:100%; gap:20px;
}
.logo-circle {
  width:110px; height:110px;
  border-radius:50%;
  background: linear-gradient(135deg, #2563EB, #1E40AF);
  display:flex; align-items:center; justify-content:center;
  box-shadow: 0 0 40px rgba(37,99,235,.5);
  animation: pulse 2s ease-in-out infinite;
}
.logo-circle svg { width:64px; height:64px; }
@keyframes pulse {
  0%,100% { box-shadow: 0 0 30px rgba(37,99,235,.4); }
  50%      { box-shadow: 0 0 60px rgba(37,99,235,.8); }
}
.app-name {
  font-size: 22px; font-weight: 800;
  color: #FFFFFF; letter-spacing: 1px;
  text-align:center; line-height:1.3;
}
.app-sub {
  font-size: 13px; color: #93C5FD;
  text-align:center; margin-top:-10px;
}
.loading-wrap {
  width: 300px;
}
.loading-bar {
  width:100%; height:5px;
  background:rgba(255,255,255,.15);
  border-radius:3px; overflow:hidden;
}
.loading-fill {
  height:100%; width:0%;
  background: linear-gradient(90deg, #3B82F6, #F59E0B);
  border-radius:3px;
  animation: load 2.8s ease-in-out forwards;
}
@keyframes load {
  0%   { width:0% }
  20%  { width:25% }
  50%  { width:60% }
  80%  { width:85% }
  100% { width:100% }
}
.loading-text {
  text-align:center; color:#64748B;
  font-size:11px; margin-top:8px;
  animation: blink 1s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
.version { position:absolute; bottom:14px; right:18px; font-size:10px; color:#334155; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-circle">
    <!-- Monitor + Checkmark SVG icon -->
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="8" y="10" width="48" height="32" rx="4" fill="#DBEAFE" opacity=".2"/>
      <rect x="8" y="10" width="48" height="32" rx="4" stroke="#93C5FD" stroke-width="3"/>
      <rect x="10" y="12" width="44" height="28" rx="2" fill="#0F172A"/>
      <!-- Check -->
      <circle cx="32" cy="26" r="10" fill="#22C55E" opacity=".9"/>
      <polyline points="26,26 30,31 38,21" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Stand -->
      <rect x="29" y="42" width="6" height="8" fill="#93C5FD"/>
      <rect x="22" y="50" width="20" height="4" rx="2" fill="#93C5FD"/>
    </svg>
  </div>

  <div>
    <div class="app-name">ExamBrowser EDU Kasuari</div>
    <div class="app-sub">Platform Ujian Digital Papua Barat Daya</div>
  </div>

  <div class="loading-wrap">
    <div class="loading-bar"><div class="loading-fill"></div></div>
    <div class="loading-text">Memuat sistem ujian...</div>
  </div>
</div>
<div class="version">v1.0.0 &copy; 2025 EDU Timur Kasuari</div>
</body>
</html>
